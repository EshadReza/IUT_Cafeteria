name: CI Pipeline — IUT Cafeteria

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-identity-provider:
    name: Identity Provider Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: identity-provider
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: identity-provider/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test-secret-ci

  test-order-gateway:
    name: Order Gateway — Validation Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: order-gateway/package-lock.json
      - run: npm ci
      - run: npm test

  test-stock-service:
    name: Stock Service — Deduction Logic Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stock-service/package-lock.json
      - run: npm ci
      - run: npm test

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-identity-provider, test-order-gateway, test-stock-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all services
        run: docker compose build --parallel
      - name: Smoke test — bring system up
        run: |
          docker compose up -d
          sleep 30
          curl -f http://localhost:3001/health || exit 1
          curl -f http://localhost:3003/health || exit 1
          curl -f http://localhost:3005/health || exit 1
          echo "All health checks passed!"
      - name: Tear down
        if: always()
        run: docker compose down -v
